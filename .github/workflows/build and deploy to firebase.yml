name: Build and Deploy

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Grant execute permissions to Gradle
        run: chmod +x ./gradlew

      - name: Create local.properties
        run: |
          cat > local.properties << EOF
          BASE_URL=${{ secrets.BASE_URL }}
          FIREBASE_BASE_URL=${{ secrets.FIREBASE_BASE_URL }}
          FIREBASE_BEARER=${{ secrets.FIREBASE_BEARER }}
          GIT_TOKEN=${{ secrets.GIT_TOKEN }}
          GIT_BASE_URL=${{ secrets.GIT_BASE_URL }}
          SHA_SECRET_KEY=${{ secrets.SHA_SECRET_KEY }}
          gpr.user=${{ secrets.GPRUSER }}
          gpr.key=${{ secrets.GIT_TOKEN }}
          EOF

      - name: Build buildSrc
        run: ./gradlew :buildSrc:build

      - name: Generate sitemap.xml
        run: ./gradlew :composeApp:generateSitemap

      - name: Build Wasm distribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution

      - name: Generate per-blog static HTML pages
        run: node scripts/generate-blog-pages.js
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          FIREBASE_BASE_URL: ${{ secrets.FIREBASE_BASE_URL }}
          FIREBASE_BEARER: ${{ secrets.FIREBASE_BEARER }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$HOME/firebase-key.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/firebase-key.json" >> $GITHUB_ENV

      - name: Deploy to Firebase
        run: firebase deploy --project bluelabs-41aef
